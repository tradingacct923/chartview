<script>
// ═════════════════════════════════════════════════════════════════════
// GLOBALS + PERSISTENT SETTINGS
// ═════════════════════════════════════════════════════════════════════
let chart, candleSeries, volumeSeries, lineSeries;
let allCandles = {};
let currentTf = localStorage.getItem('tv_timeframe') || '5m';
let chartType = localStorage.getItem('tv_chartType') || 'candle';
let fileName = '';
let totalLastTicks = 0;
let tradesData = [];       // parsed trades
let equityChart = null;    // equity curve chart
let equitySeries = null;
let currentTradeIdx = -1;  // selected trade index
let tradePriceLines = [];  // active price lines on chart
let rsiChart = null, rsiSeries = null; // RSI panel

// Indicator line series
let indSeries = {};
let indEnabled = {
    ema9: true, ema21: true, sma50: false, sma200: false, vwap: true, rsi: true
};

const TIMEFRAMES = [
    { key: '1s',  label: '1s',  seconds: 1 },
    { key: '5s',  label: '5s',  seconds: 5 },
    { key: '30s', label: '30s', seconds: 30 },
    { key: '1m',  label: '1m',  seconds: 60 },
    { key: '5m',  label: '5m',  seconds: 300 },
    { key: '15m', label: '15m', seconds: 900 },
    { key: '1h',  label: '1H',  seconds: 3600 },
    { key: '4h',  label: '4H',  seconds: 14400 },
];

// ═════════════════════════════════════════════════════════════════════
// DRAG & DROP + FILE INPUT
// ═════════════════════════════════════════════════════════════════════
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('click', () => fileInput.click());

dropZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropZone.classList.add('drag-over');
});

dropZone.addEventListener('dragleave', () => {
    dropZone.classList.remove('drag-over');
});

dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) processFile(file);
});

fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) processFile(file);
});

// ═════════════════════════════════════════════════════════════════════
// CSV PARSING (chunked streaming for large files)
// ═════════════════════════════════════════════════════════════════════
function processFile(file) {
    fileName = file.name.replace('.csv', '').replace(/_ticks$/, '').replace(/_/g, ' ');
    const fileSize = file.size;

    const progressContainer = document.getElementById('progressContainer');
    const progressFill = document.getElementById('progressFill');
    const progressLabel = document.getElementById('progressLabel');
    const progressPct = document.getElementById('progressPct');
    const progressStats = document.getElementById('progressStats');
    progressContainer.style.display = 'block';

    // Initialize candle buckets for all timeframes
    const candleBuckets = {};
    TIMEFRAMES.forEach(tf => { candleBuckets[tf.key] = {}; });

    let lastTicks = 0;
    let totalLines = 0;
    let bytesRead = 0;
    let leftover = '';
    let headerSkipped = false;
    let csvFormat = null; // 'tick' or 'ohlcv' — auto-detected from header
    let ohlcvColMap = null; // column index mapping for OHLCV formats

    const CHUNK_SIZE = 8 * 1024 * 1024; // 8MB chunks
    let offset = 0;

    function readNextChunk() {
        if (offset >= fileSize) {
            finishParsing();
            return;
        }

        const slice = file.slice(offset, offset + CHUNK_SIZE);
        const reader = new FileReader();

        reader.onload = function(e) {
            const text = leftover + e.target.result;
            const lines = text.split('\n');

            // Keep last partial line for next chunk
            leftover = lines.pop();

            for (const line of lines) {
                if (!headerSkipped) {
                    headerSkipped = true;
                    const hdr = line.toLowerCase().replace(/[\r\n]/g, '');
                    const hdrCols = hdr.split(',');

                    // Auto-detect CSV format from header
                    if (hdr.includes('type') && hdr.includes('price')) {
                        csvFormat = 'tick'; // NinjaTrader: DateTime,Type,Price,Bid,Ask,Volume
                    } else {
                        csvFormat = 'ohlcv'; // TradingView or generic OHLCV
                        ohlcvColMap = {};
                        hdrCols.forEach((col, i) => {
                            const c = col.trim().toLowerCase();
                            if (c === 'time' || c === 'date' || c === 'datetime' || c === 'timestamp') ohlcvColMap.time = i;
                            if (c === 'open') ohlcvColMap.open = i;
                            if (c === 'high') ohlcvColMap.high = i;
                            if (c === 'low') ohlcvColMap.low = i;
                            if (c === 'close') ohlcvColMap.close = i;
                            if (c === 'volume' || c === 'vol') ohlcvColMap.volume = i;
                        });
                        // Fallback column positions if headers not matched
                        if (ohlcvColMap.time === undefined) ohlcvColMap.time = 0;
                        if (ohlcvColMap.open === undefined) ohlcvColMap.open = 1;
                        if (ohlcvColMap.high === undefined) ohlcvColMap.high = 2;
                        if (ohlcvColMap.low === undefined) ohlcvColMap.low = 3;
                        if (ohlcvColMap.close === undefined) ohlcvColMap.close = 4;
                        if (ohlcvColMap.volume === undefined) ohlcvColMap.volume = 5;
                    }
                    continue;
                }

                const cols = line.split(',');
                if (cols.length < 3) continue;
                totalLines++;

                if (csvFormat === 'tick') {
                    // ── NinjaTrader tick format ──
                    if (cols.length < 6) continue;
                    if (cols[1] !== 'Last') continue;

                    lastTicks++;
                    const dtStr = cols[0].substring(0, 19);
                    const price = parseFloat(cols[2]);
                    const volume = parseInt(cols[5]) || 0;
                    if (isNaN(price)) continue;

                    const [datePart, timePart] = dtStr.split(' ');
                    const [y, mo, d] = datePart.split('-').map(Number);
                    const [h, mi, s] = timePart.split(':').map(Number);

                    for (const tf of TIMEFRAMES) {
                        const totalSec = h * 3600 + mi * 60 + s;
                        const flooredSec = Math.floor(totalSec / tf.seconds) * tf.seconds;
                        const fh = Math.floor(flooredSec / 3600);
                        const fm = Math.floor((flooredSec % 3600) / 60);
                        const fs = flooredSec % 60;
                        const flooredDt = new Date(y, mo - 1, d, fh, fm, fs);
                        const key = Math.floor(flooredDt.getTime() / 1000);

                        if (!candleBuckets[tf.key][key]) {
                            candleBuckets[tf.key][key] = {
                                time: key,
                                open: price, high: price, low: price, close: price,
                                volume: volume,
                            };
                        } else {
                            const c = candleBuckets[tf.key][key];
                            if (price > c.high) c.high = price;
                            if (price < c.low) c.low = price;
                            c.close = price;
                            c.volume += volume;
                        }
                    }
                } else {
                    // ── OHLCV format (TradingView, generic) ──
                    lastTicks++;
                    const rawTime = cols[ohlcvColMap.time].trim();
                    const open = parseFloat(cols[ohlcvColMap.open]);
                    const high = parseFloat(cols[ohlcvColMap.high]);
                    const low = parseFloat(cols[ohlcvColMap.low]);
                    const close = parseFloat(cols[ohlcvColMap.close]);
                    const volume = ohlcvColMap.volume < cols.length ? (parseInt(cols[ohlcvColMap.volume]) || 0) : 0;
                    if (isNaN(open) || isNaN(close)) continue;

                    // Parse time — handle ISO 8601, unix timestamp, or "YYYY-MM-DD HH:MM"
                    let dt;
                    if (/^\d{9,}$/.test(rawTime)) {
                        dt = new Date(parseInt(rawTime) * (rawTime.length > 10 ? 1 : 1000));
                    } else {
                        dt = new Date(rawTime.replace('T', ' ').replace('Z', ''));
                    }
                    if (isNaN(dt.getTime())) continue;

                    const ts = Math.floor(dt.getTime() / 1000);
                    const y = dt.getFullYear(), mo = dt.getMonth(), d = dt.getDate();
                    const h = dt.getHours(), mi = dt.getMinutes(), s = dt.getSeconds();

                    // For OHLCV, put raw bar into all applicable timeframes
                    for (const tf of TIMEFRAMES) {
                        const totalSec = h * 3600 + mi * 60 + s;
                        const flooredSec = Math.floor(totalSec / tf.seconds) * tf.seconds;
                        const fh = Math.floor(flooredSec / 3600);
                        const fm = Math.floor((flooredSec % 3600) / 60);
                        const fs = flooredSec % 60;
                        const flooredDt = new Date(y, mo, d, fh, fm, fs);
                        const key = Math.floor(flooredDt.getTime() / 1000);

                        if (!candleBuckets[tf.key][key]) {
                            candleBuckets[tf.key][key] = {
                                time: key,
                                open: open, high: high, low: low, close: close,
                                volume: volume,
                            };
                        } else {
                            const c = candleBuckets[tf.key][key];
                            if (high > c.high) c.high = high;
                            if (low < c.low) c.low = low;
                            c.close = close;
                            c.volume += volume;
                        }
                    }
                }
            }

            bytesRead = offset + CHUNK_SIZE;
            const pct = Math.min(100, Math.round((bytesRead / fileSize) * 100));
            progressFill.style.width = pct + '%';
            progressPct.textContent = pct + '%';
            progressLabel.textContent = `Parsing CSV... (${(bytesRead / 1024 / 1024).toFixed(0)} MB)`;
            progressStats.textContent = `${totalLines.toLocaleString()} rows | ${lastTicks.toLocaleString()} trades`;

            offset += CHUNK_SIZE;

            // Yield to UI thread
            setTimeout(readNextChunk, 0);
        };

        reader.readAsText(slice);
    }

    function finishParsing() {
        // Process leftover line
        if (leftover.trim()) {
            const cols = leftover.split(',');
            if (cols.length >= 6 && cols[1] === 'Last') {
                const price = parseFloat(cols[2]);
                const volume = parseInt(cols[5]) || 0;
                const dtStr = cols[0].substring(0, 19);
                const [datePart, timePart] = dtStr.split(' ');
                const [y, mo, d] = datePart.split('-').map(Number);
                const [h, mi, s] = timePart.split(':').map(Number);

                for (const tf of TIMEFRAMES) {
                    const totalSec = h * 3600 + mi * 60 + s;
                    const flooredSec = Math.floor(totalSec / tf.seconds) * tf.seconds;
                    const fh = Math.floor(flooredSec / 3600);
                    const fm = Math.floor((flooredSec % 3600) / 60);
                    const fs = flooredSec % 60;
                    const flooredDt = new Date(y, mo - 1, d, fh, fm, fs);
                    const key = Math.floor(flooredDt.getTime() / 1000);

                    if (!candleBuckets[tf.key][key]) {
                        candleBuckets[tf.key][key] = {
                            time: key, open: price, high: price, low: price, close: price, volume: volume,
                        };
                    } else {
                        const c = candleBuckets[tf.key][key];
                        if (price > c.high) c.high = price;
                        if (price < c.low) c.low = price;
                        c.close = price;
                        c.volume += volume;
                    }
                }
            }
        }

        // Convert bucket objects to sorted arrays
        totalLastTicks = lastTicks;
        TIMEFRAMES.forEach(tf => {
            allCandles[tf.key] = Object.values(candleBuckets[tf.key]).sort((a, b) => a.time - b.time);
        });

        progressLabel.textContent = 'Done!';
        progressPct.textContent = '100%';
        progressFill.style.width = '100%';

        setTimeout(showChart, 300);
    }

    readNextChunk();
}

// ═════════════════════════════════════════════════════════════════════
// CHART
// ═════════════════════════════════════════════════════════════════════
function showChart() {
    document.getElementById('uploadScreen').style.display = 'none';
    document.getElementById('chartScreen').style.display = 'flex';

    // Set instrument info
    const parts = fileName.split(' ');
    const symbol = parts[0] || fileName;
    document.getElementById('symbolBadge').textContent = symbol;
    document.getElementById('symbolName').textContent = fileName;
    document.getElementById('symbolExchange').textContent = 'NinjaTrader Historical';
    document.getElementById('watermark').textContent = symbol;
    document.getElementById('tickCountLabel').textContent = totalLastTicks.toLocaleString() + ' trades';

    // Build TF buttons
    const tfGroup = document.getElementById('tfGroup');
    tfGroup.innerHTML = '';
    TIMEFRAMES.forEach(tf => {
        const btn = document.createElement('button');
        btn.className = 'tf-btn' + (tf.key === currentTf ? ' active' : '');
        btn.dataset.tf = tf.key;
        btn.textContent = tf.label;
        btn.onclick = () => setTimeframe(tf.key);
        tfGroup.appendChild(btn);
    });

    createChart();
    setTimeframe(currentTf);
}

function createChart() {
    const container = document.getElementById('chart');

    chart = LightweightCharts.createChart(container, {
        width: container.clientWidth,
        height: container.clientHeight,
        layout: {
            background: { type: 'solid', color: '#0c0c12' },
            textColor: '#9b9bb4',
            fontFamily: "'Inter', sans-serif",
            fontSize: 11,
        },
        grid: {
            vertLines: { color: 'rgba(42, 42, 64, 0.4)', style: 1 },
            horzLines: { color: 'rgba(42, 42, 64, 0.4)', style: 1 },
        },
        crosshair: {
            mode: LightweightCharts.CrosshairMode.Normal,
            vertLine: { color: 'rgba(41, 98, 255, 0.35)', width: 1, style: 2, labelBackgroundColor: '#2962ff' },
            horzLine: { color: 'rgba(41, 98, 255, 0.35)', width: 1, style: 2, labelBackgroundColor: '#2962ff' },
        },
        rightPriceScale: { borderColor: '#2a2a40', scaleMargins: { top: 0.08, bottom: 0.22 } },
        timeScale: { borderColor: '#2a2a40', timeVisible: true, secondsVisible: true, rightOffset: 5, barSpacing: 8 },
    });

    candleSeries = chart.addCandlestickSeries({
        upColor: '#26a69a', downColor: '#ef5350',
        wickUpColor: '#26a69a', wickDownColor: '#ef5350',
        borderUpColor: '#26a69a', borderDownColor: '#ef5350',
    });

    lineSeries = chart.addLineSeries({
        color: '#2962ff', lineWidth: 2,
        crosshairMarkerVisible: true, crosshairMarkerRadius: 4,
    });

    volumeSeries = chart.addHistogramSeries({
        priceFormat: { type: 'volume' },
        priceScaleId: 'volume',
    });

    chart.priceScale('volume').applyOptions({ scaleMargins: { top: 0.82, bottom: 0 } });

    chart.subscribeCrosshairMove((param) => {
        if (!param || !param.time) return;
        const data = param.seriesData.get(candleSeries) || param.seriesData.get(lineSeries);
        const volData = param.seriesData.get(volumeSeries);
        if (data) updateOHLCVBar({ ...data, volume: volData ? volData.value : 0 });
    });

    new ResizeObserver(() => {
        chart.applyOptions({ width: container.clientWidth, height: container.clientHeight });
    }).observe(container);

    // Create indicator series
    indSeries.ema9 = chart.addLineSeries({ color: '#ffd54f', lineWidth: 1, title: 'EMA 9', priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false });
    indSeries.ema21 = chart.addLineSeries({ color: '#26c6da', lineWidth: 1, title: 'EMA 21', priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false });
    indSeries.sma50 = chart.addLineSeries({ color: '#ff9800', lineWidth: 1, title: 'SMA 50', priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false });
    indSeries.sma200 = chart.addLineSeries({ color: '#e040fb', lineWidth: 1, title: 'SMA 200', priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false });
    indSeries.vwap = chart.addLineSeries({ color: '#ffffff', lineWidth: 1, lineStyle: 2, title: 'VWAP', priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false });
}

function setTimeframe(tf) {
    currentTf = tf;
    localStorage.setItem('tv_timeframe', tf);
    const candles = allCandles[tf];
    if (!candles || !candles.length) return;

    document.querySelectorAll('.tf-btn').forEach(b => b.classList.toggle('active', b.dataset.tf === tf));

    const volData = candles.map(c => ({
        time: c.time,
        value: c.volume,
        color: c.close >= c.open ? 'rgba(38, 166, 154, 0.3)' : 'rgba(239, 83, 80, 0.3)',
    }));

    if (chartType === 'candle') {
        candleSeries.setData(candles);
        lineSeries.setData([]);
    } else {
        lineSeries.setData(candles.map(c => ({ time: c.time, value: c.close })));
        candleSeries.setData([]);
    }
    volumeSeries.setData(volData);
    chart.timeScale().fitContent();

    const last = candles[candles.length - 1];
    const first = candles[0];
    updateHeaderPrice(last, first);
    updateOHLCVBar(last);

    document.getElementById('statusCandles').textContent = `${candles.length.toLocaleString()} candles (${tf})`;
    const s = new Date(first.time * 1000).toLocaleDateString();
    const e = new Date(last.time * 1000).toLocaleDateString();
    document.getElementById('statusRange').textContent = `${s} – ${e}`;

    // Update indicators
    updateIndicators(candles);
}

function setChartType(type) {
    chartType = type;
    localStorage.setItem('tv_chartType', type);
    document.getElementById('btnCandle').classList.toggle('active', type === 'candle');
    document.getElementById('btnLine').classList.toggle('active', type === 'line');
    setTimeframe(currentTf);
}

function updateHeaderPrice(last, first) {
    const el = document.getElementById('headerPrice');
    const ch = document.getElementById('headerChange');
    el.textContent = last.close.toFixed(2);
    const d = last.close - first.open;
    const p = ((d / first.open) * 100).toFixed(2);
    const s = d >= 0 ? '+' : '';
    el.className = `current-price ${d >= 0 ? 'price-up' : 'price-down'}`;
    ch.textContent = `${s}${d.toFixed(2)} (${s}${p}%)`;
    ch.className = `price-change ${d >= 0 ? 'change-up' : 'change-down'}`;
}

function updateOHLCVBar(data) {
    if (!data) return;
    const up = (data.close || 0) >= (data.open || 0);
    const col = up ? 'var(--green-bright)' : 'var(--red-bright)';
    const f = v => v !== undefined ? v.toFixed(2) : '—';
    document.getElementById('infoO').textContent = f(data.open);
    document.getElementById('infoH').textContent = f(data.high);
    document.getElementById('infoL').textContent = f(data.low);
    document.getElementById('infoC').textContent = f(data.close);
    document.getElementById('infoV').textContent = data.volume !== undefined ? data.volume.toLocaleString() : '—';
    ['infoO','infoH','infoL','infoC'].forEach(id => document.getElementById(id).style.color = col);
}

function resetToUpload() {
    document.getElementById('chartScreen').style.display = 'none';
    document.getElementById('uploadScreen').style.display = 'flex';
    document.getElementById('progressContainer').style.display = 'none';
    document.getElementById('progressFill').style.width = '0%';
    document.getElementById('fileInput').value = '';
    
    if (chart) { chart.remove(); chart = null; }
    allCandles = {};
    currentTf = localStorage.getItem('tv_timeframe') || '5m';
    chartType = localStorage.getItem('tv_chartType') || 'candle';
}

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
    const m = { '1': '1s', '2': '5s', '3': '30s', '4': '1m', '5': '5m', '6': '15m', '7': '1h', '8': '4h' };
    if (m[e.key] && chart) setTimeframe(m[e.key]);
    // Trade navigation: [ and ] or left/right arrows when trades loaded
    if (tradesData.length && chart) {
        if (e.key === '[' || (e.key === 'ArrowLeft' && e.shiftKey)) navigateTrade(-1);
        if (e.key === ']' || (e.key === 'ArrowRight' && e.shiftKey)) navigateTrade(1);
    }
});

// ═════════════════════════════════════════════════════════════════════
// TRADE OVERLAY
// ═════════════════════════════════════════════════════════════════════
function loadTradesFile(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        const text = e.target.result;
        const lines = text.split('\n');
        if (lines.length < 2) return;

        const hdr = lines[0].toLowerCase().replace(/[\r\n]/g, '').split(',');
        const colMap = {};
        hdr.forEach((col, i) => {
            const c = col.trim();
            if (/date|time|entry.?time|datetime/i.test(c) && !('time' in colMap)) colMap.time = i;
            if (/side|direction|type|action/i.test(c)) colMap.side = i;
            if (/^price$|entry.?price/i.test(c)) colMap.price = i;
            if (/stop.?loss|sl$/i.test(c)) colMap.sl = i;
            if (/take.?profit|tp$/i.test(c)) colMap.tp = i;
            if (/exit.?price/i.test(c)) colMap.exitPrice = i;
            if (/exit.?time/i.test(c)) colMap.exitTime = i;
            if (/pnl|p&l|profit|result/i.test(c)) colMap.pnl = i;
        });

        // Fallback positions
        if (colMap.time === undefined) colMap.time = 0;
        if (colMap.side === undefined) colMap.side = 1;
        if (colMap.price === undefined) colMap.price = 2;

        tradesData = [];
        for (let i = 1; i < lines.length; i++) {
            const line = lines[i].trim();
            if (!line) continue;
            const cols = line.split(',');
            if (cols.length < 3) continue;

            const rawTime = cols[colMap.time]?.trim();
            const side = (cols[colMap.side]?.trim() || '').toUpperCase();
            const price = parseFloat(cols[colMap.price]);
            if (!rawTime || isNaN(price)) continue;

            let dt;
            if (/^\d{9,}$/.test(rawTime)) {
                dt = new Date(parseInt(rawTime) * (rawTime.length > 10 ? 1 : 1000));
            } else {
                dt = new Date(rawTime.replace('T', ' ').replace('Z', ''));
            }
            if (isNaN(dt.getTime())) continue;

            const trade = {
                time: Math.floor(dt.getTime() / 1000),
                side: side.includes('BUY') || side.includes('LONG') || side === 'B' ? 'BUY' : 'SELL',
                price: price,
                sl: colMap.sl !== undefined ? parseFloat(cols[colMap.sl]) : NaN,
                tp: colMap.tp !== undefined ? parseFloat(cols[colMap.tp]) : NaN,
                exitPrice: colMap.exitPrice !== undefined ? parseFloat(cols[colMap.exitPrice]) : NaN,
                pnl: colMap.pnl !== undefined ? parseFloat(cols[colMap.pnl]) : NaN,
            };

            if (colMap.exitTime !== undefined) {
                const rawExit = cols[colMap.exitTime]?.trim();
                if (rawExit) {
                    let edt;
                    if (/^\d{9,}$/.test(rawExit)) {
                        edt = new Date(parseInt(rawExit) * (rawExit.length > 10 ? 1 : 1000));
                    } else {
                        edt = new Date(rawExit.replace('T', ' ').replace('Z', ''));
                    }
                    if (!isNaN(edt.getTime())) trade.exitTime = Math.floor(edt.getTime() / 1000);
                }
            }

            tradesData.push(trade);
        }

        tradesData.sort((a, b) => a.time - b.time);

        // Update button state
        const btn = document.getElementById('btnTrades');
        btn.classList.add('loaded');
        btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> ${tradesData.length} Trades`;

        // Show stats and overlay
        showTradeStats();
        overlayTrades();
        showEquityCurve();
    };
    reader.readAsText(file);
}

function showTradeStats() {
    if (!tradesData.length) return;
    const bar = document.getElementById('tradesStats');
    bar.style.display = 'flex';

    const wins = tradesData.filter(t => !isNaN(t.pnl) && t.pnl > 0).length;
    const losses = tradesData.filter(t => !isNaN(t.pnl) && t.pnl < 0).length;
    const breakeven = tradesData.filter(t => !isNaN(t.pnl) && t.pnl === 0).length;
    const totalWithPnl = tradesData.filter(t => !isNaN(t.pnl));
    const totalPnl = totalWithPnl.reduce((s, t) => s + t.pnl, 0);
    const winRate = totalWithPnl.length > 0 ? (wins / totalWithPnl.length * 100).toFixed(1) : '—';
    const grossWin = totalWithPnl.filter(t => t.pnl > 0).reduce((s, t) => s + t.pnl, 0);
    const grossLoss = Math.abs(totalWithPnl.filter(t => t.pnl < 0).reduce((s, t) => s + t.pnl, 0));
    const profitFactor = grossLoss > 0 ? (grossWin / grossLoss).toFixed(2) : '∞';
    const avgWin = wins > 0 ? (grossWin / wins).toFixed(2) : '—';
    const avgLoss = losses > 0 ? (grossLoss / losses).toFixed(2) : '—';

    // Max drawdown
    let peak = 0, maxDD = 0, running = 0;
    totalWithPnl.forEach(t => {
        running += t.pnl;
        if (running > peak) peak = running;
        const dd = peak - running;
        if (dd > maxDD) maxDD = dd;
    });

    const pnlClass = totalPnl >= 0 ? 'stat-positive' : 'stat-negative';

    bar.innerHTML = `
        <div class="stat-item"><span class="stat-label">Trades</span><span class="stat-value stat-neutral">${tradesData.length}</span></div>
        <div class="stat-item"><span class="stat-label">Win Rate</span><span class="stat-value ${wins > losses ? 'stat-positive' : 'stat-negative'}">${winRate}%</span></div>
        <div class="stat-item"><span class="stat-label">W/L</span><span class="stat-value stat-neutral">${wins}/${losses}</span></div>
        <div class="stat-item"><span class="stat-label">Net P&L</span><span class="stat-value ${pnlClass}">${totalPnl >= 0 ? '+' : ''}${totalPnl.toFixed(2)}</span></div>
        <div class="stat-item"><span class="stat-label">PF</span><span class="stat-value stat-neutral">${profitFactor}</span></div>
        <div class="stat-item"><span class="stat-label">Avg Win</span><span class="stat-value stat-positive">+${avgWin}</span></div>
        <div class="stat-item"><span class="stat-label">Avg Loss</span><span class="stat-value stat-negative">-${avgLoss}</span></div>
        <div class="stat-item"><span class="stat-label">Max DD</span><span class="stat-value stat-negative">-${maxDD.toFixed(2)}</span></div>
    `;
}

function overlayTrades() {
    if (!candleSeries || !tradesData.length) return;

    // Show trade navigator in toolbar
    let nav = document.getElementById('tradeNav');
    if (!nav) {
        const toolbar = document.querySelector('.toolbar');
        nav = document.createElement('div');
        nav.id = 'tradeNav';
        nav.className = 'trade-nav visible';
        nav.innerHTML = `
            <button class="trade-nav-btn" onclick="navigateTrade(-1)" id="btnPrevTrade">◀</button>
            <span class="trade-nav-label" id="tradeNavLabel">Trade 1/${tradesData.length}</span>
            <button class="trade-nav-btn" onclick="navigateTrade(1)" id="btnNextTrade">▶</button>
            <button class="trade-nav-btn" onclick="showAllTrades()" title="Show all trades">All</button>
        `;
        toolbar.appendChild(nav);
    } else {
        nav.classList.add('visible');
        document.getElementById('tradeNavLabel').textContent = `Trade 1/${tradesData.length}`;
    }

    // Show all trades as markers initially
    showAllTrades();
}

function showAllTrades() {
    clearTradeOverlay();
    currentTradeIdx = -1;

    const markers = [];
    tradesData.forEach(t => {
        const isBuy = t.side === 'BUY';
        markers.push({
            time: t.time,
            position: isBuy ? 'belowBar' : 'aboveBar',
            color: isBuy ? '#00e676' : '#ff5252',
            shape: isBuy ? 'arrowUp' : 'arrowDown',
            text: isBuy ? 'B' : 'S',
        });
        if (t.exitTime && !isNaN(t.exitPrice)) {
            markers.push({
                time: t.exitTime,
                position: isBuy ? 'aboveBar' : 'belowBar',
                color: (!isNaN(t.pnl) && t.pnl >= 0) ? '#00e676' : '#ff5252',
                shape: 'circle',
                text: !isNaN(t.pnl) ? (t.pnl >= 0 ? '+' : '') + t.pnl.toFixed(2) : '',
            });
        }
    });
    markers.sort((a, b) => a.time - b.time);
    candleSeries.setMarkers(markers);

    // Draw shaded zones for ALL trades
    const chartEl = document.getElementById('chart');
    function drawAllZones() {
        chartEl.querySelectorAll('.trade-zone').forEach(el => el.remove());
        const timeScale = chart.timeScale();

        tradesData.forEach((t, i) => {
            const entryTime = t.time;
            const exitTime = t.exitTime || (t.time + 600);
            const x1 = timeScale.timeToCoordinate(entryTime);
            const x2 = timeScale.timeToCoordinate(exitTime);
            if (x1 === null || x2 === null) return;

            const left = Math.min(x1, x2);
            const width = Math.max(Math.abs(x2 - x1), 20);
            const yEntry = candleSeries.priceToCoordinate(t.price);
            if (yEntry === null) return;

            // TP zone
            if (!isNaN(t.tp)) {
                const yTp = candleSeries.priceToCoordinate(t.tp);
                if (yTp !== null) {
                    const zone = document.createElement('div');
                    zone.className = 'trade-zone';
                    const top = Math.min(yEntry, yTp);
                    zone.style.cssText = `position:absolute;left:${left}px;top:${top}px;width:${width}px;height:${Math.abs(yEntry-yTp)}px;background:rgba(0,230,118,0.10);border:1px solid rgba(0,230,118,0.3);border-radius:2px;pointer-events:none;z-index:3;`;
                    chartEl.appendChild(zone);
                }
            }
            // SL zone
            if (!isNaN(t.sl)) {
                const ySl = candleSeries.priceToCoordinate(t.sl);
                if (ySl !== null) {
                    const zone = document.createElement('div');
                    zone.className = 'trade-zone';
                    const top = Math.min(yEntry, ySl);
                    zone.style.cssText = `position:absolute;left:${left}px;top:${top}px;width:${width}px;height:${Math.abs(yEntry-ySl)}px;background:rgba(255,82,82,0.10);border:1px solid rgba(255,82,82,0.3);border-radius:2px;pointer-events:none;z-index:3;`;
                    chartEl.appendChild(zone);
                }
            }
        });
    }

    drawAllZones();
    tradeZoneRedrawFn = drawAllZones;
    chart.timeScale().subscribeVisibleLogicalRangeChange(drawAllZones);

    document.getElementById('tradeInfoBox').classList.remove('visible');
    document.getElementById('tradeNavLabel').textContent = `All ${tradesData.length}`;
}

function navigateTrade(dir) {
    if (!tradesData.length) return;
    
    if (currentTradeIdx === -1) {
        currentTradeIdx = dir > 0 ? 0 : tradesData.length - 1;
    } else {
        currentTradeIdx = Math.max(0, Math.min(tradesData.length - 1, currentTradeIdx + dir));
    }

    highlightTrade(currentTradeIdx);
}

function highlightTrade(idx) {
    clearTradeOverlay();
    const t = tradesData[idx];
    if (!t) return;

    currentTradeIdx = idx;
    const isBuy = t.side === 'BUY';

    // Update nav label
    document.getElementById('tradeNavLabel').textContent = `Trade ${idx + 1}/${tradesData.length}`;
    document.getElementById('btnPrevTrade').disabled = idx === 0;
    document.getElementById('btnNextTrade').disabled = idx === tradesData.length - 1;

    // Entry marker
    const markers = [{
        time: t.time,
        position: isBuy ? 'belowBar' : 'aboveBar',
        color: isBuy ? '#00e676' : '#ff5252',
        shape: isBuy ? 'arrowUp' : 'arrowDown',
        text: `${isBuy ? 'BUY' : 'SELL'} @ ${t.price.toFixed(2)}`,
    }];

    // Exit marker
    if (t.exitTime && !isNaN(t.exitPrice)) {
        markers.push({
            time: t.exitTime,
            position: isBuy ? 'aboveBar' : 'belowBar',
            color: (!isNaN(t.pnl) && t.pnl >= 0) ? '#00e676' : '#ff5252',
            shape: 'circle',
            text: `EXIT @ ${t.exitPrice.toFixed(2)}`,
        });
    }
    candleSeries.setMarkers(markers);

    // ── Entry price line (dashed) ──
    tradePriceLines.push(candleSeries.createPriceLine({
        price: t.price,
        color: '#448aff',
        lineWidth: 1,
        lineStyle: 2,
        axisLabelVisible: true,
        title: '',
    }));

    // ── Draw shaded TP/SL zones using HTML overlays ──
    const chartEl = document.getElementById('chart');
    const entryTime = t.time;
    const exitTime = t.exitTime || (t.time + 1200);

    function drawTradeZones() {
        // Remove old zone divs
        chartEl.querySelectorAll('.trade-zone').forEach(el => el.remove());

        const timeScale = chart.timeScale();
        const priceScale = candleSeries;

        // Get pixel coordinates
        const x1 = timeScale.timeToCoordinate(entryTime);
        const x2 = timeScale.timeToCoordinate(exitTime);
        if (x1 === null || x2 === null) return;

        const left = Math.min(x1, x2);
        const width = Math.max(Math.abs(x2 - x1), 40);
        const yEntry = priceScale.priceToCoordinate(t.price);
        if (yEntry === null) return;

        // ── TP Zone (green shaded box) ──
        if (!isNaN(t.tp)) {
            const yTp = priceScale.priceToCoordinate(t.tp);
            if (yTp !== null) {
                const tpTop = Math.min(yEntry, yTp);
                const tpHeight = Math.abs(yEntry - yTp);
                const tpPoints = Math.abs(t.tp - t.price).toFixed(2);

                const tpZone = document.createElement('div');
                tpZone.className = 'trade-zone';
                tpZone.style.cssText = `
                    position: absolute; left: ${left}px; top: ${tpTop}px;
                    width: ${width}px; height: ${tpHeight}px;
                    background: rgba(0, 230, 118, 0.12);
                    border: 1px solid rgba(0, 230, 118, 0.35);
                    border-radius: 3px;
                    pointer-events: none; z-index: 3;
                `;
                chartEl.appendChild(tpZone);

                // TP Label
                const tpLabel = document.createElement('div');
                tpLabel.className = 'trade-zone';
                tpLabel.style.cssText = `
                    position: absolute; left: ${left + 4}px; top: ${tpTop + 2}px;
                    background: rgba(0, 230, 118, 0.85); color: #000;
                    padding: 2px 8px; border-radius: 3px;
                    font-size: 10px; font-weight: 700; font-family: 'Inter', sans-serif;
                    pointer-events: none; z-index: 4; white-space: nowrap;
                `;
                tpLabel.textContent = `Target: ${t.tp.toFixed(2)} (+${tpPoints} pts)`;
                chartEl.appendChild(tpLabel);
            }
        }

        // ── SL Zone (red shaded box) ──
        if (!isNaN(t.sl)) {
            const ySl = priceScale.priceToCoordinate(t.sl);
            if (ySl !== null) {
                const slTop = Math.min(yEntry, ySl);
                const slHeight = Math.abs(yEntry - ySl);
                const slPoints = Math.abs(t.sl - t.price).toFixed(2);

                const slZone = document.createElement('div');
                slZone.className = 'trade-zone';
                slZone.style.cssText = `
                    position: absolute; left: ${left}px; top: ${slTop}px;
                    width: ${width}px; height: ${slHeight}px;
                    background: rgba(255, 82, 82, 0.12);
                    border: 1px solid rgba(255, 82, 82, 0.35);
                    border-radius: 3px;
                    pointer-events: none; z-index: 3;
                `;
                chartEl.appendChild(slZone);

                // SL Label
                const slLabel = document.createElement('div');
                slLabel.className = 'trade-zone';
                slLabel.style.cssText = `
                    position: absolute; left: ${left + 4}px; top: ${slTop + slHeight - 18}px;
                    background: rgba(255, 82, 82, 0.85); color: #fff;
                    padding: 2px 8px; border-radius: 3px;
                    font-size: 10px; font-weight: 700; font-family: 'Inter', sans-serif;
                    pointer-events: none; z-index: 4; white-space: nowrap;
                `;
                slLabel.textContent = `Stop: ${t.sl.toFixed(2)} (-${slPoints} pts)`;
                chartEl.appendChild(slLabel);
            }
        }

        // ── Entry Label ──
        const entryLabel = document.createElement('div');
        entryLabel.className = 'trade-zone';
        entryLabel.style.cssText = `
            position: absolute; left: ${left + 4}px; top: ${yEntry - 9}px;
            background: rgba(68, 138, 255, 0.85); color: #fff;
            padding: 2px 8px; border-radius: 3px;
            font-size: 10px; font-weight: 700; font-family: 'Inter', sans-serif;
            pointer-events: none; z-index: 4; white-space: nowrap;
        `;
        entryLabel.textContent = `${t.side} @ ${t.price.toFixed(2)}`;
        chartEl.appendChild(entryLabel);

        // ── P&L Result Label (at exit point) ──
        if (!isNaN(t.pnl) && !isNaN(t.exitPrice)) {
            const yExit = priceScale.priceToCoordinate(t.exitPrice);
            if (yExit !== null) {
                const pnlLabel = document.createElement('div');
                pnlLabel.className = 'trade-zone';
                const isWin = t.pnl >= 0;
                const rr = (!isNaN(t.sl) && !isNaN(t.tp)) ?
                    (Math.abs(t.tp - t.price) / Math.abs(t.sl - t.price)).toFixed(1) : '';
                pnlLabel.style.cssText = `
                    position: absolute; left: ${left + width + 6}px; top: ${yExit - 14}px;
                    background: ${isWin ? 'rgba(0, 230, 118, 0.85)' : 'rgba(255, 82, 82, 0.85)'};
                    color: ${isWin ? '#000' : '#fff'};
                    padding: 3px 10px; border-radius: 4px;
                    font-size: 11px; font-weight: 700; font-family: 'Inter', sans-serif;
                    pointer-events: none; z-index: 4; white-space: nowrap;
                    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
                `;
                pnlLabel.textContent = `P&L: ${isWin ? '+' : ''}${t.pnl.toFixed(2)} ${rr ? '| R:R ' + rr : ''}`;
                chartEl.appendChild(pnlLabel);
            }
        }
    }

    // Draw zones now and on every scroll/zoom
    drawTradeZones();
    tradeZoneRedrawFn = drawTradeZones;
    chart.timeScale().subscribeVisibleLogicalRangeChange(drawTradeZones);
    chart.subscribeCrosshairMove(() => {}); // triggers reflow

    // ── Trade Info Box ──
    const box = document.getElementById('tradeInfoBox');
    box.classList.add('visible');

    const rr = (!isNaN(t.sl) && !isNaN(t.tp)) ?
        (Math.abs(t.tp - t.price) / Math.abs(t.sl - t.price)).toFixed(2) : '—';
    const pnlVal = !isNaN(t.pnl) ? t.pnl : 0;
    const isWin = pnlVal >= 0;
    const entryTimeStr = new Date(t.time * 1000).toLocaleString();
    const exitTimeStr = t.exitTime ? new Date(t.exitTime * 1000).toLocaleString() : '—';

    box.innerHTML = `
        <div class="trade-info-header">
            <span class="trade-side-badge ${isBuy ? 'buy' : 'sell'}">${t.side}</span>
            <span style="color: var(--text-secondary); font-weight: 600;">Trade #${idx + 1}</span>
        </div>
        <div class="trade-info-row">
            <span class="trade-info-key">Entry</span>
            <span class="trade-info-val" style="color: #448aff;">${t.price.toFixed(2)}</span>
        </div>
        ${!isNaN(t.tp) ? `<div class="trade-info-row">
            <span class="trade-info-key">✅ Target</span>
            <span class="trade-info-val" style="color: #00e676;">${t.tp.toFixed(2)} <span style="opacity:0.6">(+${Math.abs(t.tp - t.price).toFixed(2)} pts)</span></span>
        </div>` : ''}
        ${!isNaN(t.sl) ? `<div class="trade-info-row">
            <span class="trade-info-key">⛔ Stop</span>
            <span class="trade-info-val" style="color: #ff5252;">${t.sl.toFixed(2)} <span style="opacity:0.6">(-${Math.abs(t.sl - t.price).toFixed(2)} pts)</span></span>
        </div>` : ''}
        ${!isNaN(t.exitPrice) ? `<div class="trade-info-row">
            <span class="trade-info-key">Exit</span>
            <span class="trade-info-val" style="color: #ffd54f;">${t.exitPrice.toFixed(2)}</span>
        </div>` : ''}
        <div class="trade-info-row">
            <span class="trade-info-key">R:R</span>
            <span class="trade-info-val">${rr}</span>
        </div>
        ${!isNaN(t.pnl) ? `<div class="trade-pnl-box ${isWin ? 'win' : 'loss'}">
            P&L: ${isWin ? '+' : ''}${t.pnl.toFixed(2)} pts
        </div>` : ''}
    `;

    // Scroll chart to this trade
    chart.timeScale().setVisibleRange({
        from: t.time - 600,
        to: (t.exitTime || t.time) + 600,
    });
}

let tradeZoneRedrawFn = null;

function clearTradeOverlay() {
    // Remove price lines
    tradePriceLines.forEach(line => {
        try { candleSeries.removePriceLine(line); } catch(e) {}
    });
    tradePriceLines = [];
    candleSeries.setMarkers([]);
    // Remove zone overlays
    document.getElementById('chart').querySelectorAll('.trade-zone').forEach(el => el.remove());
    // Unsubscribe redraw
    if (tradeZoneRedrawFn) {
        try { chart.timeScale().unsubscribeVisibleLogicalRangeChange(tradeZoneRedrawFn); } catch(e) {}
        tradeZoneRedrawFn = null;
    }
}

function showEquityCurve() {
    const withPnl = tradesData.filter(t => !isNaN(t.pnl));
    if (!withPnl.length) return;

    const wrapper = document.getElementById('equityWrapper');
    wrapper.classList.add('visible');

    const container = document.getElementById('equityChart');

    if (equityChart) { equityChart.remove(); equityChart = null; }

    equityChart = LightweightCharts.createChart(container, {
        width: container.clientWidth,
        height: container.clientHeight,
        layout: {
            background: { type: 'solid', color: '#0c0c12' },
            textColor: '#65657e',
            fontFamily: "'Inter', sans-serif",
            fontSize: 10,
        },
        grid: {
            vertLines: { color: 'rgba(42, 42, 64, 0.3)' },
            horzLines: { color: 'rgba(42, 42, 64, 0.3)' },
        },
        rightPriceScale: { borderColor: '#2a2a40' },
        timeScale: { borderColor: '#2a2a40', timeVisible: true, visible: true },
        crosshair: {
            vertLine: { color: 'rgba(41, 98, 255, 0.2)', width: 1, style: 2 },
            horzLine: { color: 'rgba(41, 98, 255, 0.2)', width: 1, style: 2 },
        },
    });

    // Build equity data
    let cumPnl = 0;
    const equityData = withPnl.map(t => {
        cumPnl += t.pnl;
        return { time: t.exitTime || t.time, value: cumPnl };
    });

    // Area series for equity
    equitySeries = equityChart.addAreaSeries({
        lineColor: cumPnl >= 0 ? '#00e676' : '#ff5252',
        topColor: cumPnl >= 0 ? 'rgba(0, 230, 118, 0.2)' : 'rgba(255, 82, 82, 0.2)',
        bottomColor: cumPnl >= 0 ? 'rgba(0, 230, 118, 0.02)' : 'rgba(255, 82, 82, 0.02)',
        lineWidth: 2,
    });
    equitySeries.setData(equityData);

    // Zero line
    equitySeries.createPriceLine({
        price: 0,
        color: '#65657e',
        lineWidth: 1,
        lineStyle: 2,
    });

    equityChart.timeScale().fitContent();

    // Sync time scales
    chart.timeScale().subscribeVisibleTimeRangeChange((range) => {
        if (equityChart) equityChart.timeScale().setVisibleRange(range);
    });

    new ResizeObserver(() => {
        equityChart.applyOptions({ width: container.clientWidth, height: container.clientHeight });
    }).observe(container);
}

// ═════════════════════════════════════════════════════════════════════
// DRAWING TOOLS (Horizontal & Vertical Lines)
// ═════════════════════════════════════════════════════════════════════
let drawingMode = null; // 'hline', 'vline', or null
let userDrawings = []; // { type, priceLine? }
let userVLines = [];   // vertical line divs

function toggleDrawingMode(mode) {
    if (drawingMode === mode) {
        drawingMode = null;
    } else {
        drawingMode = mode;
    }
    document.getElementById('btnHLine').classList.toggle('active', drawingMode === 'hline');
    document.getElementById('btnVLine').classList.toggle('active', drawingMode === 'vline');

    // Change cursor
    const chartEl = document.getElementById('chart');
    chartEl.style.cursor = drawingMode ? 'crosshair' : '';
}

// Listen for clicks on chart to place lines
if (document.getElementById('chart')) {
    document.getElementById('chart').addEventListener('click', (e) => {
        if (!drawingMode || !chart || !candleSeries) return;

        const rect = e.target.closest('#chart').getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        if (drawingMode === 'hline') {
            // Get price at y coordinate
            const price = candleSeries.coordinateToPrice(y);
            if (price === null) return;

            const line = candleSeries.createPriceLine({
                price: price,
                color: '#ffd54f',
                lineWidth: 1,
                lineStyle: 0,
                axisLabelVisible: true,
                title: `${price.toFixed(2)}`,
            });
            userDrawings.push({ type: 'hline', line: line });
        }

        if (drawingMode === 'vline') {
            // Get time at x coordinate
            const time = chart.timeScale().coordinateToTime(x);
            if (time === null) return;

            // Draw vertical line as HTML overlay
            drawVerticalLine(time);
        }

        // Exit drawing mode after placing
        toggleDrawingMode(null);
    });
}

function drawVerticalLine(time) {
    const chartEl = document.getElementById('chart');
    const timeCoord = chart.timeScale().timeToCoordinate(time);
    if (timeCoord === null) return;

    const vline = document.createElement('div');
    vline.className = 'user-vline';
    vline.dataset.time = time;
    vline.style.cssText = `
        position: absolute; left: ${timeCoord}px; top: 0;
        width: 1px; height: 100%;
        background: rgba(255, 213, 79, 0.6);
        border-left: 1px dashed #ffd54f;
        pointer-events: none; z-index: 3;
    `;
    chartEl.appendChild(vline);
    userVLines.push({ time: time, el: vline });

    // Update on scroll
    const updateVLine = () => {
        const newX = chart.timeScale().timeToCoordinate(time);
        if (newX !== null) {
            vline.style.left = newX + 'px';
            vline.style.display = '';
        } else {
            vline.style.display = 'none';
        }
    };
    chart.timeScale().subscribeVisibleLogicalRangeChange(updateVLine);
    vline._unsubscribe = () => {
        try { chart.timeScale().unsubscribeVisibleLogicalRangeChange(updateVLine); } catch(e) {}
    };
}

function clearAllDrawings() {
    // Remove horizontal lines
    userDrawings.forEach(d => {
        try { candleSeries.removePriceLine(d.line); } catch(e) {}
    });
    userDrawings = [];

    // Remove vertical lines
    userVLines.forEach(v => {
        if (v.el._unsubscribe) v.el._unsubscribe();
        v.el.remove();
    });
    userVLines = [];
}

// Add H/V keyboard shortcuts for drawing
document.addEventListener('keydown', (e) => {
    if (!chart) return;
    if (e.key === 'h' || e.key === 'H') toggleDrawingMode('hline');
    if (e.key === 'v' || e.key === 'V') toggleDrawingMode('vline');
    if (e.key === 'Delete') clearAllDrawings();
});

// ═════════════════════════════════════════════════════════════════════
// TECHNICAL INDICATORS
// ═════════════════════════════════════════════════════════════════════
function calcEMA(candles, period) {
    const k = 2 / (period + 1);
    const result = [];
    let ema = candles[0].close;
    for (let i = 0; i < candles.length; i++) {
        ema = candles[i].close * k + ema * (1 - k);
        if (i >= period - 1) result.push({ time: candles[i].time, value: ema });
    }
    return result;
}

function calcSMA(candles, period) {
    const result = [];
    for (let i = period - 1; i < candles.length; i++) {
        let sum = 0;
        for (let j = i - period + 1; j <= i; j++) sum += candles[j].close;
        result.push({ time: candles[i].time, value: sum / period });
    }
    return result;
}

function calcVWAP(candles) {
    const result = [];
    let cumVP = 0, cumVol = 0;
    let lastDay = null;
    for (const c of candles) {
        const day = new Date(c.time * 1000).toDateString();
        if (day !== lastDay) {
            cumVP = 0; cumVol = 0; lastDay = day;
        }
        const tp = (c.high + c.low + c.close) / 3;
        cumVP += tp * c.volume;
        cumVol += c.volume;
        if (cumVol > 0) result.push({ time: c.time, value: cumVP / cumVol });
    }
    return result;
}

function calcRSI(candles, period = 14) {
    const result = [];
    if (candles.length < period + 1) return result;

    let avgGain = 0, avgLoss = 0;
    for (let i = 1; i <= period; i++) {
        const change = candles[i].close - candles[i - 1].close;
        if (change > 0) avgGain += change;
        else avgLoss -= change;
    }
    avgGain /= period;
    avgLoss /= period;

    let rs = avgLoss > 0 ? avgGain / avgLoss : 100;
    result.push({ time: candles[period].time, value: 100 - 100 / (1 + rs) });

    for (let i = period + 1; i < candles.length; i++) {
        const change = candles[i].close - candles[i - 1].close;
        const gain = change > 0 ? change : 0;
        const loss = change < 0 ? -change : 0;
        avgGain = (avgGain * (period - 1) + gain) / period;
        avgLoss = (avgLoss * (period - 1) + loss) / period;
        rs = avgLoss > 0 ? avgGain / avgLoss : 100;
        result.push({ time: candles[i].time, value: 100 - 100 / (1 + rs) });
    }
    return result;
}

function updateIndicators(candles) {
    if (!candles || !candles.length || !chart) return;

    // EMA 9
    indSeries.ema9.setData(indEnabled.ema9 ? calcEMA(candles, 9) : []);
    // EMA 21
    indSeries.ema21.setData(indEnabled.ema21 ? calcEMA(candles, 21) : []);
    // SMA 50
    indSeries.sma50.setData(indEnabled.sma50 ? calcSMA(candles, 50) : []);
    // SMA 200
    indSeries.sma200.setData(indEnabled.sma200 ? calcSMA(candles, 200) : []);
    // VWAP
    indSeries.vwap.setData(indEnabled.vwap ? calcVWAP(candles) : []);

    // RSI Panel
    if (indEnabled.rsi) {
        createRSIPanel(candles);
    } else {
        document.getElementById('rsiWrapper').classList.remove('visible');
        if (rsiChart) { rsiChart.remove(); rsiChart = null; }
    }
}

function toggleIndicator(name) {
    indEnabled[name] = !indEnabled[name];

    // Update button state
    const btnMap = { ema9: 'indEma9', ema21: 'indEma21', sma50: 'indSma50', sma200: 'indSma200', vwap: 'indVwap', rsi: 'indRsi' };
    const btn = document.getElementById(btnMap[name]);
    if (btn) btn.classList.toggle('active', indEnabled[name]);

    // Re-render
    const candles = allCandles[currentTf];
    if (candles && candles.length) updateIndicators(candles);
}

function createRSIPanel(candles) {
    const wrapper = document.getElementById('rsiWrapper');
    wrapper.classList.add('visible');
    const container = document.getElementById('rsiChart');

    if (rsiChart) { rsiChart.remove(); rsiChart = null; }

    rsiChart = LightweightCharts.createChart(container, {
        width: container.clientWidth,
        height: container.clientHeight,
        layout: {
            background: { type: 'solid', color: '#0c0c12' },
            textColor: '#65657e',
            fontFamily: "'Inter', sans-serif",
            fontSize: 10,
        },
        grid: {
            vertLines: { color: 'rgba(42, 42, 64, 0.3)' },
            horzLines: { color: 'rgba(42, 42, 64, 0.3)' },
        },
        rightPriceScale: { borderColor: '#2a2a40', scaleMargins: { top: 0.05, bottom: 0.05 } },
        timeScale: { borderColor: '#2a2a40', timeVisible: true, visible: true },
        crosshair: {
            vertLine: { color: 'rgba(41, 98, 255, 0.2)', width: 1, style: 2 },
            horzLine: { color: 'rgba(41, 98, 255, 0.2)', width: 1, style: 2 },
        },
    });

    rsiSeries = rsiChart.addLineSeries({
        color: '#b388ff', lineWidth: 1.5,
        priceLineVisible: false, lastValueVisible: true,
    });

    const rsiData = calcRSI(candles, 14);
    rsiSeries.setData(rsiData);

    // Overbought / Oversold lines
    rsiSeries.createPriceLine({ price: 70, color: 'rgba(255, 82, 82, 0.4)', lineWidth: 1, lineStyle: 2, title: '70' });
    rsiSeries.createPriceLine({ price: 30, color: 'rgba(0, 230, 118, 0.4)', lineWidth: 1, lineStyle: 2, title: '30' });
    rsiSeries.createPriceLine({ price: 50, color: 'rgba(100, 100, 130, 0.3)', lineWidth: 1, lineStyle: 2, title: '' });

    rsiChart.timeScale().fitContent();

    // Sync time scales
    chart.timeScale().subscribeVisibleTimeRangeChange((range) => {
        if (rsiChart) {
            try { rsiChart.timeScale().setVisibleRange(range); } catch(e) {}
        }
    });

    new ResizeObserver(() => {
        if (rsiChart) rsiChart.applyOptions({ width: container.clientWidth, height: container.clientHeight });
    }).observe(container);
}
