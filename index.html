<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tick Data Chart Viewer</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #0c0c12;
            --bg-secondary: #12121c;
            --bg-tertiary: #1a1a28;
            --bg-card: #151522;
            --bg-hover: #222236;
            --border: #2a2a40;
            --border-active: #3d3d5c;
            --text-primary: #e4e4ec;
            --text-secondary: #9b9bb4;
            --text-muted: #65657e;
            --accent: #2962ff;
            --accent-hover: #1e53e4;
            --accent-glow: rgba(41, 98, 255, 0.25);
            --green: #26a69a;
            --green-bright: #00e676;
            --red: #ef5350;
            --red-bright: #ff5252;
            --gold: #ffd54f;
            --gold-dim: #b8972e;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        /* ─── Upload Screen ───────────────────────────────────────────── */
        .upload-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: var(--bg-primary);
            background-image: 
                radial-gradient(ellipse at 20% 50%, rgba(41, 98, 255, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(255, 213, 79, 0.04) 0%, transparent 50%);
        }

        .upload-container {
            text-align: center;
            max-width: 560px;
            width: 100%;
            padding: 0 24px;
        }

        .upload-logo {
            font-size: 42px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffd54f 0%, #ffab00 50%, #ff6d00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        .upload-sub {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 36px;
        }

        .drop-zone {
            border: 2px dashed var(--border);
            border-radius: 16px;
            padding: 56px 40px;
            cursor: pointer;
            transition: all 0.25s ease;
            background: var(--bg-card);
            position: relative;
            overflow: hidden;
        }

        .drop-zone::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(41, 98, 255, 0.03), rgba(255, 213, 79, 0.03));
            opacity: 0;
            transition: opacity 0.25s;
        }

        .drop-zone:hover, .drop-zone.drag-over {
            border-color: var(--accent);
            background: rgba(41, 98, 255, 0.05);
            box-shadow: 0 0 40px var(--accent-glow);
        }

        .drop-zone:hover::before, .drop-zone.drag-over::before {
            opacity: 1;
        }

        .drop-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 20px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--bg-tertiary), var(--bg-hover));
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border);
        }

        .drop-icon svg {
            width: 28px;
            height: 28px;
            color: var(--accent);
        }

        .drop-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .drop-hint {
            font-size: 13px;
            color: var(--text-muted);
        }

        .drop-hint strong {
            color: var(--accent);
            font-weight: 600;
        }

        .file-input { display: none; }

        .upload-format {
            margin-top: 24px;
            font-size: 11px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .format-tag {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            padding: 3px 10px;
            border-radius: 4px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 10px;
            color: var(--text-secondary);
        }

        /* ─── Progress Bar ────────────────────────────────────────────── */
        .progress-container {
            margin-top: 28px;
            display: none;
        }

        .progress-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }

        .progress-bar-bg {
            height: 4px;
            background: var(--bg-tertiary);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #448aff);
            border-radius: 2px;
            width: 0%;
            transition: width 0.2s ease;
        }

        .progress-stats {
            margin-top: 12px;
            font-size: 11px;
            color: var(--text-muted);
        }

        /* ─── Chart Screen ────────────────────────────────────────────── */
        .chart-screen {
            display: none;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            display: flex;
            align-items: center;
            padding: 8px 16px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            gap: 16px;
            min-height: 48px;
        }

        .symbol-badge {
            background: linear-gradient(135deg, #ffd54f, #ffab00);
            color: #1a1a2e;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .symbol-name {
            font-size: 14px;
            font-weight: 600;
        }

        .symbol-exchange {
            font-size: 11px;
            color: var(--text-muted);
        }

        .price-display {
            display: flex;
            align-items: baseline;
            gap: 8px;
            margin-left: auto;
        }

        .current-price {
            font-size: 20px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        .price-change {
            font-size: 11px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 4px;
        }

        .price-up { color: var(--green-bright); }
        .price-down { color: var(--red-bright); }
        .change-up { background: rgba(0, 230, 118, 0.12); color: var(--green-bright); }
        .change-down { background: rgba(255, 82, 82, 0.12); color: var(--red-bright); }

        .new-file-btn {
            padding: 6px 14px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
            margin-left: 12px;
        }

        .new-file-btn:hover {
            border-color: var(--accent);
            color: var(--text-primary);
        }

        /* ─── Toolbar ─────────────────────────────────────────────────── */
        .toolbar {
            display: flex;
            align-items: center;
            padding: 4px 16px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            gap: 4px;
            min-height: 38px;
            flex-wrap: wrap;
        }

        .tf-group {
            display: flex;
            gap: 2px;
            padding: 2px;
            background: var(--bg-tertiary);
            border-radius: 6px;
        }

        .tf-btn {
            padding: 4px 11px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            background: transparent;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
        }

        .tf-btn:hover { color: var(--text-primary); background: var(--bg-hover); }

        .tf-btn.active {
            color: #fff;
            background: var(--accent);
            box-shadow: 0 2px 8px var(--accent-glow);
        }

        .toolbar-sep {
            width: 1px;
            height: 22px;
            background: var(--border);
            margin: 0 8px;
        }

        .toolbar-label {
            font-size: 10px;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-right: 6px;
        }

        .chart-type-btn {
            padding: 4px 10px;
            font-size: 11px;
            font-weight: 500;
            color: var(--text-muted);
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .chart-type-btn:hover { border-color: var(--accent); color: var(--text-primary); }

        .chart-type-btn.active {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(41, 98, 255, 0.08);
        }

        /* ─── OHLCV Overlay ───────────────────────────────────────────── */
        .ohlcv-bar {
            position: absolute;
            top: 4px;
            left: 8px;
            z-index: 5;
            display: flex;
            gap: 14px;
            font-size: 11px;
            font-weight: 500;
            padding: 5px 10px;
            background: rgba(12, 12, 18, 0.82);
            backdrop-filter: blur(8px);
            border-radius: 6px;
            border: 1px solid var(--border);
        }

        .ohlcv-item { display: flex; gap: 4px; }
        .ohlcv-label { color: var(--text-muted); }
        .ohlcv-value { font-variant-numeric: tabular-nums; }

        /* ─── Chart ───────────────────────────────────────────────────── */
        .chart-wrapper {
            flex: 1;
            position: relative;
            background: var(--bg-primary);
        }

        #chart { width: 100%; height: 100%; }

        .watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 56px;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.02);
            pointer-events: none;
            z-index: 1;
            letter-spacing: 3px;
            user-select: none;
        }

        /* ─── Status Bar ──────────────────────────────────────────────── */
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 3px 16px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            font-size: 10px;
            color: var(--text-muted);
            min-height: 26px;
        }

        .status-left, .status-right { display: flex; align-items: center; gap: 16px; }

        .status-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 6px var(--green);
            display: inline-block;
            margin-right: 4px;
        }
    </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════════════ -->
<!-- UPLOAD SCREEN                                                      -->
<!-- ═══════════════════════════════════════════════════════════════════ -->
<div class="upload-screen" id="uploadScreen">
    <div class="upload-container">
        <div class="upload-logo">Tick Viewer</div>
        <div class="upload-sub">Drop your NinjaTrader tick CSV to visualize it instantly</div>

        <div class="drop-zone" id="dropZone">
            <div class="drop-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                    <polyline points="17 8 12 3 7 8"/>
                    <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
            </div>
            <div class="drop-title">Drag & drop your CSV file here</div>
            <div class="drop-hint">or <strong>click to browse</strong></div>
            <input type="file" class="file-input" id="fileInput" accept=".csv">
        </div>

        <div class="upload-format">
            Expected format: 
            <span class="format-tag">DateTime,Type,Price,Bid,Ask,Volume</span>
        </div>

        <div class="progress-container" id="progressContainer">
            <div class="progress-label">
                <span id="progressLabel">Parsing CSV...</span>
                <span id="progressPct">0%</span>
            </div>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progressFill"></div>
            </div>
            <div class="progress-stats" id="progressStats"></div>
        </div>
    </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════════ -->
<!-- CHART SCREEN                                                       -->
<!-- ═══════════════════════════════════════════════════════════════════ -->
<div class="chart-screen" id="chartScreen">
    <div class="header">
        <div class="symbol-badge" id="symbolBadge">—</div>
        <div>
            <div class="symbol-name" id="symbolName">—</div>
            <div class="symbol-exchange" id="symbolExchange">—</div>
        </div>
        <div class="price-display">
            <span class="current-price" id="headerPrice">—</span>
            <span class="price-change" id="headerChange">—</span>
        </div>
        <button class="new-file-btn" onclick="resetToUpload()">↑ New File</button>
    </div>

    <div class="toolbar">
        <span class="toolbar-label">TF</span>
        <div class="tf-group" id="tfGroup"></div>
        <div class="toolbar-sep"></div>
        <button class="chart-type-btn active" id="btnCandle" onclick="setChartType('candle')">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="5" y="4" width="4" height="16" rx="1"/><rect x="15" y="8" width="4" height="12" rx="1"/></svg>
            Candles
        </button>
        <button class="chart-type-btn" id="btnLine" onclick="setChartType('line')">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="22 12 18 8 12 14 8 10 2 16"/></svg>
            Line
        </button>
        <div class="toolbar-sep"></div>
        <span class="toolbar-label" id="tickCountLabel">—</span>
    </div>

    <div class="chart-wrapper">
        <div class="watermark" id="watermark">—</div>
        <div class="ohlcv-bar" id="ohlcvBar">
            <div class="ohlcv-item"><span class="ohlcv-label">O</span> <span class="ohlcv-value" id="infoO">—</span></div>
            <div class="ohlcv-item"><span class="ohlcv-label">H</span> <span class="ohlcv-value" id="infoH">—</span></div>
            <div class="ohlcv-item"><span class="ohlcv-label">L</span> <span class="ohlcv-value" id="infoL">—</span></div>
            <div class="ohlcv-item"><span class="ohlcv-label">C</span> <span class="ohlcv-value" id="infoC">—</span></div>
            <div class="ohlcv-item"><span class="ohlcv-label">Vol</span> <span class="ohlcv-value" id="infoV">—</span></div>
        </div>
        <div id="chart"></div>
    </div>

    <div class="status-bar">
        <div class="status-left">
            <span><span class="status-dot"></span>Historical Data</span>
            <span id="statusCandles">—</span>
        </div>
        <div class="status-right">
            <span id="statusRange">—</span>
            <span>Tick Viewer v1.0</span>
        </div>
    </div>
</div>

<script>
// ═════════════════════════════════════════════════════════════════════
// GLOBALS
// ═════════════════════════════════════════════════════════════════════
let chart, candleSeries, volumeSeries, lineSeries;
let allCandles = {};
let currentTf = '5m';
let chartType = 'candle';
let fileName = '';
let totalLastTicks = 0;

const TIMEFRAMES = [
    { key: '1s',  label: '1s',  seconds: 1 },
    { key: '5s',  label: '5s',  seconds: 5 },
    { key: '30s', label: '30s', seconds: 30 },
    { key: '1m',  label: '1m',  seconds: 60 },
    { key: '5m',  label: '5m',  seconds: 300 },
    { key: '15m', label: '15m', seconds: 900 },
    { key: '1h',  label: '1H',  seconds: 3600 },
    { key: '4h',  label: '4H',  seconds: 14400 },
];

// ═════════════════════════════════════════════════════════════════════
// DRAG & DROP + FILE INPUT
// ═════════════════════════════════════════════════════════════════════
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('click', () => fileInput.click());

dropZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropZone.classList.add('drag-over');
});

dropZone.addEventListener('dragleave', () => {
    dropZone.classList.remove('drag-over');
});

dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) processFile(file);
});

fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) processFile(file);
});

// ═════════════════════════════════════════════════════════════════════
// CSV PARSING (chunked streaming for large files)
// ═════════════════════════════════════════════════════════════════════
function processFile(file) {
    fileName = file.name.replace('.csv', '').replace(/_ticks$/, '').replace(/_/g, ' ');
    const fileSize = file.size;

    const progressContainer = document.getElementById('progressContainer');
    const progressFill = document.getElementById('progressFill');
    const progressLabel = document.getElementById('progressLabel');
    const progressPct = document.getElementById('progressPct');
    const progressStats = document.getElementById('progressStats');
    progressContainer.style.display = 'block';

    // Initialize candle buckets for all timeframes
    const candleBuckets = {};
    TIMEFRAMES.forEach(tf => { candleBuckets[tf.key] = {}; });

    let lastTicks = 0;
    let totalLines = 0;
    let bytesRead = 0;
    let leftover = '';
    let headerSkipped = false;
    let csvFormat = null; // 'tick' or 'ohlcv' — auto-detected from header
    let ohlcvColMap = null; // column index mapping for OHLCV formats

    const CHUNK_SIZE = 8 * 1024 * 1024; // 8MB chunks
    let offset = 0;

    function readNextChunk() {
        if (offset >= fileSize) {
            finishParsing();
            return;
        }

        const slice = file.slice(offset, offset + CHUNK_SIZE);
        const reader = new FileReader();

        reader.onload = function(e) {
            const text = leftover + e.target.result;
            const lines = text.split('\n');

            // Keep last partial line for next chunk
            leftover = lines.pop();

            for (const line of lines) {
                if (!headerSkipped) {
                    headerSkipped = true;
                    const hdr = line.toLowerCase().replace(/[\r\n]/g, '');
                    const hdrCols = hdr.split(',');

                    // Auto-detect CSV format from header
                    if (hdr.includes('type') && hdr.includes('price')) {
                        csvFormat = 'tick'; // NinjaTrader: DateTime,Type,Price,Bid,Ask,Volume
                    } else {
                        csvFormat = 'ohlcv'; // TradingView or generic OHLCV
                        ohlcvColMap = {};
                        hdrCols.forEach((col, i) => {
                            const c = col.trim().toLowerCase();
                            if (c === 'time' || c === 'date' || c === 'datetime' || c === 'timestamp') ohlcvColMap.time = i;
                            if (c === 'open') ohlcvColMap.open = i;
                            if (c === 'high') ohlcvColMap.high = i;
                            if (c === 'low') ohlcvColMap.low = i;
                            if (c === 'close') ohlcvColMap.close = i;
                            if (c === 'volume' || c === 'vol') ohlcvColMap.volume = i;
                        });
                        // Fallback column positions if headers not matched
                        if (ohlcvColMap.time === undefined) ohlcvColMap.time = 0;
                        if (ohlcvColMap.open === undefined) ohlcvColMap.open = 1;
                        if (ohlcvColMap.high === undefined) ohlcvColMap.high = 2;
                        if (ohlcvColMap.low === undefined) ohlcvColMap.low = 3;
                        if (ohlcvColMap.close === undefined) ohlcvColMap.close = 4;
                        if (ohlcvColMap.volume === undefined) ohlcvColMap.volume = 5;
                    }
                    continue;
                }

                const cols = line.split(',');
                if (cols.length < 3) continue;
                totalLines++;

                if (csvFormat === 'tick') {
                    // ── NinjaTrader tick format ──
                    if (cols.length < 6) continue;
                    if (cols[1] !== 'Last') continue;

                    lastTicks++;
                    const dtStr = cols[0].substring(0, 19);
                    const price = parseFloat(cols[2]);
                    const volume = parseInt(cols[5]) || 0;
                    if (isNaN(price)) continue;

                    const [datePart, timePart] = dtStr.split(' ');
                    const [y, mo, d] = datePart.split('-').map(Number);
                    const [h, mi, s] = timePart.split(':').map(Number);

                    for (const tf of TIMEFRAMES) {
                        const totalSec = h * 3600 + mi * 60 + s;
                        const flooredSec = Math.floor(totalSec / tf.seconds) * tf.seconds;
                        const fh = Math.floor(flooredSec / 3600);
                        const fm = Math.floor((flooredSec % 3600) / 60);
                        const fs = flooredSec % 60;
                        const flooredDt = new Date(y, mo - 1, d, fh, fm, fs);
                        const key = Math.floor(flooredDt.getTime() / 1000);

                        if (!candleBuckets[tf.key][key]) {
                            candleBuckets[tf.key][key] = {
                                time: key,
                                open: price, high: price, low: price, close: price,
                                volume: volume,
                            };
                        } else {
                            const c = candleBuckets[tf.key][key];
                            if (price > c.high) c.high = price;
                            if (price < c.low) c.low = price;
                            c.close = price;
                            c.volume += volume;
                        }
                    }
                } else {
                    // ── OHLCV format (TradingView, generic) ──
                    lastTicks++;
                    const rawTime = cols[ohlcvColMap.time].trim();
                    const open = parseFloat(cols[ohlcvColMap.open]);
                    const high = parseFloat(cols[ohlcvColMap.high]);
                    const low = parseFloat(cols[ohlcvColMap.low]);
                    const close = parseFloat(cols[ohlcvColMap.close]);
                    const volume = ohlcvColMap.volume < cols.length ? (parseInt(cols[ohlcvColMap.volume]) || 0) : 0;
                    if (isNaN(open) || isNaN(close)) continue;

                    // Parse time — handle ISO 8601, unix timestamp, or "YYYY-MM-DD HH:MM"
                    let dt;
                    if (/^\d{9,}$/.test(rawTime)) {
                        dt = new Date(parseInt(rawTime) * (rawTime.length > 10 ? 1 : 1000));
                    } else {
                        dt = new Date(rawTime.replace('T', ' ').replace('Z', ''));
                    }
                    if (isNaN(dt.getTime())) continue;

                    const ts = Math.floor(dt.getTime() / 1000);
                    const y = dt.getFullYear(), mo = dt.getMonth(), d = dt.getDate();
                    const h = dt.getHours(), mi = dt.getMinutes(), s = dt.getSeconds();

                    // For OHLCV, put raw bar into all applicable timeframes
                    for (const tf of TIMEFRAMES) {
                        const totalSec = h * 3600 + mi * 60 + s;
                        const flooredSec = Math.floor(totalSec / tf.seconds) * tf.seconds;
                        const fh = Math.floor(flooredSec / 3600);
                        const fm = Math.floor((flooredSec % 3600) / 60);
                        const fs = flooredSec % 60;
                        const flooredDt = new Date(y, mo, d, fh, fm, fs);
                        const key = Math.floor(flooredDt.getTime() / 1000);

                        if (!candleBuckets[tf.key][key]) {
                            candleBuckets[tf.key][key] = {
                                time: key,
                                open: open, high: high, low: low, close: close,
                                volume: volume,
                            };
                        } else {
                            const c = candleBuckets[tf.key][key];
                            if (high > c.high) c.high = high;
                            if (low < c.low) c.low = low;
                            c.close = close;
                            c.volume += volume;
                        }
                    }
                }
            }

            bytesRead = offset + CHUNK_SIZE;
            const pct = Math.min(100, Math.round((bytesRead / fileSize) * 100));
            progressFill.style.width = pct + '%';
            progressPct.textContent = pct + '%';
            progressLabel.textContent = `Parsing CSV... (${(bytesRead / 1024 / 1024).toFixed(0)} MB)`;
            progressStats.textContent = `${totalLines.toLocaleString()} rows | ${lastTicks.toLocaleString()} trades`;

            offset += CHUNK_SIZE;

            // Yield to UI thread
            setTimeout(readNextChunk, 0);
        };

        reader.readAsText(slice);
    }

    function finishParsing() {
        // Process leftover line
        if (leftover.trim()) {
            const cols = leftover.split(',');
            if (cols.length >= 6 && cols[1] === 'Last') {
                const price = parseFloat(cols[2]);
                const volume = parseInt(cols[5]) || 0;
                const dtStr = cols[0].substring(0, 19);
                const [datePart, timePart] = dtStr.split(' ');
                const [y, mo, d] = datePart.split('-').map(Number);
                const [h, mi, s] = timePart.split(':').map(Number);

                for (const tf of TIMEFRAMES) {
                    const totalSec = h * 3600 + mi * 60 + s;
                    const flooredSec = Math.floor(totalSec / tf.seconds) * tf.seconds;
                    const fh = Math.floor(flooredSec / 3600);
                    const fm = Math.floor((flooredSec % 3600) / 60);
                    const fs = flooredSec % 60;
                    const flooredDt = new Date(y, mo - 1, d, fh, fm, fs);
                    const key = Math.floor(flooredDt.getTime() / 1000);

                    if (!candleBuckets[tf.key][key]) {
                        candleBuckets[tf.key][key] = {
                            time: key, open: price, high: price, low: price, close: price, volume: volume,
                        };
                    } else {
                        const c = candleBuckets[tf.key][key];
                        if (price > c.high) c.high = price;
                        if (price < c.low) c.low = price;
                        c.close = price;
                        c.volume += volume;
                    }
                }
            }
        }

        // Convert bucket objects to sorted arrays
        totalLastTicks = lastTicks;
        TIMEFRAMES.forEach(tf => {
            allCandles[tf.key] = Object.values(candleBuckets[tf.key]).sort((a, b) => a.time - b.time);
        });

        progressLabel.textContent = 'Done!';
        progressPct.textContent = '100%';
        progressFill.style.width = '100%';

        setTimeout(showChart, 300);
    }

    readNextChunk();
}

// ═════════════════════════════════════════════════════════════════════
// CHART
// ═════════════════════════════════════════════════════════════════════
function showChart() {
    document.getElementById('uploadScreen').style.display = 'none';
    document.getElementById('chartScreen').style.display = 'flex';

    // Set instrument info
    const parts = fileName.split(' ');
    const symbol = parts[0] || fileName;
    document.getElementById('symbolBadge').textContent = symbol;
    document.getElementById('symbolName').textContent = fileName;
    document.getElementById('symbolExchange').textContent = 'NinjaTrader Historical';
    document.getElementById('watermark').textContent = symbol;
    document.getElementById('tickCountLabel').textContent = totalLastTicks.toLocaleString() + ' trades';

    // Build TF buttons
    const tfGroup = document.getElementById('tfGroup');
    tfGroup.innerHTML = '';
    TIMEFRAMES.forEach(tf => {
        const btn = document.createElement('button');
        btn.className = 'tf-btn' + (tf.key === currentTf ? ' active' : '');
        btn.dataset.tf = tf.key;
        btn.textContent = tf.label;
        btn.onclick = () => setTimeframe(tf.key);
        tfGroup.appendChild(btn);
    });

    createChart();
    setTimeframe(currentTf);
}

function createChart() {
    const container = document.getElementById('chart');

    chart = LightweightCharts.createChart(container, {
        width: container.clientWidth,
        height: container.clientHeight,
        layout: {
            background: { type: 'solid', color: '#0c0c12' },
            textColor: '#9b9bb4',
            fontFamily: "'Inter', sans-serif",
            fontSize: 11,
        },
        grid: {
            vertLines: { color: 'rgba(42, 42, 64, 0.4)', style: 1 },
            horzLines: { color: 'rgba(42, 42, 64, 0.4)', style: 1 },
        },
        crosshair: {
            mode: LightweightCharts.CrosshairMode.Normal,
            vertLine: { color: 'rgba(41, 98, 255, 0.35)', width: 1, style: 2, labelBackgroundColor: '#2962ff' },
            horzLine: { color: 'rgba(41, 98, 255, 0.35)', width: 1, style: 2, labelBackgroundColor: '#2962ff' },
        },
        rightPriceScale: { borderColor: '#2a2a40', scaleMargins: { top: 0.08, bottom: 0.22 } },
        timeScale: { borderColor: '#2a2a40', timeVisible: true, secondsVisible: true, rightOffset: 5, barSpacing: 8 },
    });

    candleSeries = chart.addCandlestickSeries({
        upColor: '#26a69a', downColor: '#ef5350',
        wickUpColor: '#26a69a', wickDownColor: '#ef5350',
        borderUpColor: '#26a69a', borderDownColor: '#ef5350',
    });

    lineSeries = chart.addLineSeries({
        color: '#2962ff', lineWidth: 2,
        crosshairMarkerVisible: true, crosshairMarkerRadius: 4,
    });

    volumeSeries = chart.addHistogramSeries({
        priceFormat: { type: 'volume' },
        priceScaleId: 'volume',
    });

    chart.priceScale('volume').applyOptions({ scaleMargins: { top: 0.82, bottom: 0 } });

    chart.subscribeCrosshairMove((param) => {
        if (!param || !param.time) return;
        const data = param.seriesData.get(candleSeries) || param.seriesData.get(lineSeries);
        const volData = param.seriesData.get(volumeSeries);
        if (data) updateOHLCVBar({ ...data, volume: volData ? volData.value : 0 });
    });

    new ResizeObserver(() => {
        chart.applyOptions({ width: container.clientWidth, height: container.clientHeight });
    }).observe(container);
}

function setTimeframe(tf) {
    currentTf = tf;
    const candles = allCandles[tf];
    if (!candles || !candles.length) return;

    document.querySelectorAll('.tf-btn').forEach(b => b.classList.toggle('active', b.dataset.tf === tf));

    const volData = candles.map(c => ({
        time: c.time,
        value: c.volume,
        color: c.close >= c.open ? 'rgba(38, 166, 154, 0.3)' : 'rgba(239, 83, 80, 0.3)',
    }));

    if (chartType === 'candle') {
        candleSeries.setData(candles);
        lineSeries.setData([]);
    } else {
        lineSeries.setData(candles.map(c => ({ time: c.time, value: c.close })));
        candleSeries.setData([]);
    }
    volumeSeries.setData(volData);
    chart.timeScale().fitContent();

    const last = candles[candles.length - 1];
    const first = candles[0];
    updateHeaderPrice(last, first);
    updateOHLCVBar(last);

    document.getElementById('statusCandles').textContent = `${candles.length.toLocaleString()} candles (${tf})`;
    const s = new Date(first.time * 1000).toLocaleDateString();
    const e = new Date(last.time * 1000).toLocaleDateString();
    document.getElementById('statusRange').textContent = `${s} – ${e}`;
}

function setChartType(type) {
    chartType = type;
    document.getElementById('btnCandle').classList.toggle('active', type === 'candle');
    document.getElementById('btnLine').classList.toggle('active', type === 'line');
    setTimeframe(currentTf);
}

function updateHeaderPrice(last, first) {
    const el = document.getElementById('headerPrice');
    const ch = document.getElementById('headerChange');
    el.textContent = last.close.toFixed(2);
    const d = last.close - first.open;
    const p = ((d / first.open) * 100).toFixed(2);
    const s = d >= 0 ? '+' : '';
    el.className = `current-price ${d >= 0 ? 'price-up' : 'price-down'}`;
    ch.textContent = `${s}${d.toFixed(2)} (${s}${p}%)`;
    ch.className = `price-change ${d >= 0 ? 'change-up' : 'change-down'}`;
}

function updateOHLCVBar(data) {
    if (!data) return;
    const up = (data.close || 0) >= (data.open || 0);
    const col = up ? 'var(--green-bright)' : 'var(--red-bright)';
    const f = v => v !== undefined ? v.toFixed(2) : '—';
    document.getElementById('infoO').textContent = f(data.open);
    document.getElementById('infoH').textContent = f(data.high);
    document.getElementById('infoL').textContent = f(data.low);
    document.getElementById('infoC').textContent = f(data.close);
    document.getElementById('infoV').textContent = data.volume !== undefined ? data.volume.toLocaleString() : '—';
    ['infoO','infoH','infoL','infoC'].forEach(id => document.getElementById(id).style.color = col);
}

function resetToUpload() {
    document.getElementById('chartScreen').style.display = 'none';
    document.getElementById('uploadScreen').style.display = 'flex';
    document.getElementById('progressContainer').style.display = 'none';
    document.getElementById('progressFill').style.width = '0%';
    document.getElementById('fileInput').value = '';
    
    if (chart) { chart.remove(); chart = null; }
    allCandles = {};
    currentTf = '5m';
    chartType = 'candle';
}

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
    const m = { '1': '1s', '2': '5s', '3': '30s', '4': '1m', '5': '5m', '6': '15m', '7': '1h', '8': '4h' };
    if (m[e.key] && chart) setTimeframe(m[e.key]);
});
</script>
