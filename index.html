<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tick Data Chart Viewer</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #0c0c12;
            --bg-secondary: #12121c;
            --bg-tertiary: #1a1a28;
            --bg-card: #151522;
            --bg-hover: #222236;
            --border: #2a2a40;
            --border-active: #3d3d5c;
            --text-primary: #e4e4ec;
            --text-secondary: #9b9bb4;
            --text-muted: #65657e;
            --accent: #2962ff;
            --accent-hover: #1e53e4;
            --accent-glow: rgba(41, 98, 255, 0.25);
            --green: #26a69a;
            --green-bright: #00e676;
            --red: #ef5350;
            --red-bright: #ff5252;
            --gold: #ffd54f;
            --gold-dim: #b8972e;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        /* ─── Upload Screen ───────────────────────────────────────────── */
        .upload-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: var(--bg-primary);
            background-image: 
                radial-gradient(ellipse at 20% 50%, rgba(41, 98, 255, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(255, 213, 79, 0.04) 0%, transparent 50%);
        }

        .upload-container {
            text-align: center;
            max-width: 560px;
            width: 100%;
            padding: 0 24px;
        }

        .upload-logo {
            font-size: 42px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffd54f 0%, #ffab00 50%, #ff6d00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        .upload-sub {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 36px;
        }

        .drop-zone {
            border: 2px dashed var(--border);
            border-radius: 16px;
            padding: 56px 40px;
            cursor: pointer;
            transition: all 0.25s ease;
            background: var(--bg-card);
            position: relative;
            overflow: hidden;
        }

        .drop-zone::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(41, 98, 255, 0.03), rgba(255, 213, 79, 0.03));
            opacity: 0;
            transition: opacity 0.25s;
        }

        .drop-zone:hover, .drop-zone.drag-over {
            border-color: var(--accent);
            background: rgba(41, 98, 255, 0.05);
            box-shadow: 0 0 40px var(--accent-glow);
        }

        .drop-zone:hover::before, .drop-zone.drag-over::before {
            opacity: 1;
        }

        .drop-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 20px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--bg-tertiary), var(--bg-hover));
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border);
        }

        .drop-icon svg {
            width: 28px;
            height: 28px;
            color: var(--accent);
        }

        .drop-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .drop-hint {
            font-size: 13px;
            color: var(--text-muted);
        }

        .drop-hint strong {
            color: var(--accent);
            font-weight: 600;
        }

        .file-input { display: none; }

        .upload-format {
            margin-top: 24px;
            font-size: 11px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .format-tag {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            padding: 3px 10px;
            border-radius: 4px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 10px;
            color: var(--text-secondary);
        }

        /* ─── Progress Bar ────────────────────────────────────────────── */
        .progress-container {
            margin-top: 28px;
            display: none;
        }

        .progress-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }

        .progress-bar-bg {
            height: 4px;
            background: var(--bg-tertiary);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #448aff);
            border-radius: 2px;
            width: 0%;
            transition: width 0.2s ease;
        }

        .progress-stats {
            margin-top: 12px;
            font-size: 11px;
            color: var(--text-muted);
        }

        /* ─── Chart Screen ────────────────────────────────────────────── */
        .chart-screen {
            display: none;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            display: flex;
            align-items: center;
            padding: 8px 16px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            gap: 16px;
            min-height: 48px;
        }

        .symbol-badge {
            background: linear-gradient(135deg, #ffd54f, #ffab00);
            color: #1a1a2e;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .symbol-name {
            font-size: 14px;
            font-weight: 600;
        }

        .symbol-exchange {
            font-size: 11px;
            color: var(--text-muted);
        }

        .price-display {
            display: flex;
            align-items: baseline;
            gap: 8px;
            margin-left: auto;
        }

        .current-price {
            font-size: 20px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        .price-change {
            font-size: 11px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 4px;
        }

        .price-up { color: var(--green-bright); }
        .price-down { color: var(--red-bright); }
        .change-up { background: rgba(0, 230, 118, 0.12); color: var(--green-bright); }
        .change-down { background: rgba(255, 82, 82, 0.12); color: var(--red-bright); }

        .new-file-btn {
            padding: 6px 14px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
            margin-left: 12px;
        }

        .new-file-btn:hover {
            border-color: var(--accent);
            color: var(--text-primary);
        }

        /* ─── Toolbar ─────────────────────────────────────────────────── */
        .toolbar {
            display: flex;
            align-items: center;
            padding: 4px 16px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            gap: 4px;
            min-height: 38px;
            flex-wrap: wrap;
        }

        .tf-group {
            display: flex;
            gap: 2px;
            padding: 2px;
            background: var(--bg-tertiary);
            border-radius: 6px;
        }

        .tf-btn {
            padding: 4px 11px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            background: transparent;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
        }

        .tf-btn:hover { color: var(--text-primary); background: var(--bg-hover); }

        .tf-btn.active {
            color: #fff;
            background: var(--accent);
            box-shadow: 0 2px 8px var(--accent-glow);
        }

        .toolbar-sep {
            width: 1px;
            height: 22px;
            background: var(--border);
            margin: 0 8px;
        }

        .toolbar-label {
            font-size: 10px;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-right: 6px;
        }

        .chart-type-btn {
            padding: 4px 10px;
            font-size: 11px;
            font-weight: 500;
            color: var(--text-muted);
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .chart-type-btn:hover { border-color: var(--accent); color: var(--text-primary); }

        .chart-type-btn.active {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(41, 98, 255, 0.08);
        }

        /* ─── OHLCV Overlay ───────────────────────────────────────────── */
        .ohlcv-bar {
            position: absolute;
            top: 4px;
            left: 8px;
            z-index: 5;
            display: flex;
            gap: 14px;
            font-size: 11px;
            font-weight: 500;
            padding: 5px 10px;
            background: rgba(12, 12, 18, 0.82);
            backdrop-filter: blur(8px);
            border-radius: 6px;
            border: 1px solid var(--border);
        }

        .ohlcv-item { display: flex; gap: 4px; }
        .ohlcv-label { color: var(--text-muted); }
        .ohlcv-value { font-variant-numeric: tabular-nums; }

        /* ─── Chart ───────────────────────────────────────────────────── */
        .chart-wrapper {
            flex: 1;
            position: relative;
            background: var(--bg-primary);
        }

        #chart { width: 100%; height: 100%; }

        .watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 56px;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.02);
            pointer-events: none;
            z-index: 1;
            letter-spacing: 3px;
            user-select: none;
        }

        /* ─── Status Bar ──────────────────────────────────────────────── */
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 3px 16px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            font-size: 10px;
            color: var(--text-muted);
            min-height: 26px;
        }

        .status-left, .status-right { display: flex; align-items: center; gap: 16px; }

        .status-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 6px var(--green);
            display: inline-block;
            margin-right: 4px;
        }

        /* ─── Trade Overlay Styles ─────────────────────────────────────── */
        .trades-btn {
            padding: 4px 12px;
            font-size: 11px;
            font-weight: 600;
            color: var(--gold);
            background: rgba(255, 213, 79, 0.08);
            border: 1px solid rgba(255, 213, 79, 0.25);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .trades-btn:hover {
            background: rgba(255, 213, 79, 0.15);
            border-color: var(--gold);
        }

        .trades-btn.loaded {
            color: var(--green-bright);
            border-color: rgba(0, 230, 118, 0.3);
            background: rgba(0, 230, 118, 0.08);
        }

        .trades-stats {
            display: none;
            align-items: center;
            padding: 3px 16px;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border);
            gap: 20px;
            font-size: 11px;
            min-height: 30px;
            overflow-x: auto;
        }

        .stat-item {
            display: flex;
            gap: 5px;
            white-space: nowrap;
        }

        .stat-label { color: var(--text-muted); font-weight: 500; }
        .stat-value { font-weight: 600; font-variant-numeric: tabular-nums; }
        .stat-positive { color: var(--green-bright); }
        .stat-negative { color: var(--red-bright); }
        .stat-neutral { color: var(--text-primary); }

        .equity-wrapper {
            height: 0;
            background: var(--bg-primary);
            border-top: 1px solid var(--border);
            transition: height 0.3s ease;
            position: relative;
        }

        .equity-wrapper.visible {
            height: 120px;
        }

        .equity-label {
            position: absolute;
            top: 4px;
            left: 8px;
            z-index: 5;
            font-size: 10px;
            font-weight: 600;
            color: var(--text-muted);
            background: rgba(12, 12, 18, 0.8);
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid var(--border);
        }

        #equityChart { width: 100%; height: 100%; }

        /* ─── Trade Navigator ───────────────────────────────────────── */
        .trade-nav {
            display: none;
            align-items: center;
            gap: 6px;
            margin-left: auto;
        }

        .trade-nav.visible { display: flex; }

        .trade-nav-btn {
            padding: 3px 8px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.15s;
        }

        .trade-nav-btn:hover { border-color: var(--accent); color: var(--text-primary); }
        .trade-nav-btn:disabled { opacity: 0.3; cursor: default; }

        .trade-nav-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            padding: 0 4px;
        }

        /* ─── Trade Info Box ───────────────────────────────────────── */
        .trade-info-box {
            display: none;
            position: absolute;
            top: 36px;
            right: 8px;
            z-index: 10;
            background: rgba(18, 18, 28, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-active);
            border-radius: 8px;
            padding: 12px 16px;
            min-width: 220px;
            font-size: 11px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .trade-info-box.visible { display: block; }

        .trade-info-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }

        .trade-side-badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 700;
            font-size: 10px;
            letter-spacing: 0.5px;
        }

        .trade-side-badge.buy { background: rgba(0, 230, 118, 0.15); color: #00e676; }
        .trade-side-badge.sell { background: rgba(255, 82, 82, 0.15); color: #ff5252; }

        .trade-info-row {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
        }

        .trade-info-key { color: var(--text-muted); }
        .trade-info-val { font-weight: 600; font-variant-numeric: tabular-nums; }

        .trade-pnl-box {
            margin-top: 8px;
            padding: 6px 10px;
            border-radius: 6px;
            text-align: center;
            font-weight: 700;
            font-size: 13px;
        }

        .trade-pnl-box.win { background: rgba(0, 230, 118, 0.12); color: #00e676; border: 1px solid rgba(0, 230, 118, 0.25); }
        .trade-pnl-box.loss { background: rgba(255, 82, 82, 0.12); color: #ff5252; border: 1px solid rgba(255, 82, 82, 0.25); }

        /* ─── Drawing Tools ─────────────────────────────────────────── */
        .draw-btn {
            padding: 4px 10px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .draw-btn:hover { border-color: var(--accent); color: var(--text-primary); }
        .draw-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(41, 98, 255, 0.1); }

        .refresh-btn {
            padding: 3px 12px;
            font-size: 10px;
            font-weight: 600;
            color: var(--text-secondary);
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

        /* ─── Indicator Toggle Buttons ───────────────────────────────────── */
        .ind-btn {
            padding: 3px 8px;
            font-size: 10px;
            font-weight: 600;
            color: var(--text-muted);
            background: transparent;
            border: 1px solid transparent;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .ind-btn:hover { color: var(--text-primary); }
        .ind-btn.active { color: var(--text-primary); background: var(--bg-tertiary); border-color: var(--border); }

        .ind-dot {
            width: 6px; height: 6px; border-radius: 50%;
            display: inline-block;
        }

        .rsi-wrapper {
            height: 0;
            background: var(--bg-primary);
            border-top: 1px solid var(--border);
            transition: height 0.3s ease;
            position: relative;
        }

        .rsi-wrapper.visible { height: 100px; }

        .rsi-label {
            position: absolute;
            top: 4px;
            left: 8px;
            z-index: 5;
            font-size: 10px;
            font-weight: 600;
            color: var(--text-muted);
            background: rgba(12, 12, 18, 0.8);
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid var(--border);
        }

        #rsiChart { width: 100%; height: 100%; }
    </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════════════ -->
<!-- UPLOAD SCREEN                                                      -->
<!-- ═══════════════════════════════════════════════════════════════════ -->
<div class="upload-screen" id="uploadScreen">
    <div class="upload-container">
        <div class="upload-logo">Tick Viewer</div>
        <div class="upload-sub">Drop your NinjaTrader tick CSV to visualize it instantly</div>

        <div class="drop-zone" id="dropZone">
            <div class="drop-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                    <polyline points="17 8 12 3 7 8"/>
                    <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
            </div>
            <div class="drop-title">Drag & drop your CSV file here</div>
            <div class="drop-hint">or <strong>click to browse</strong></div>
            <input type="file" class="file-input" id="fileInput" accept=".csv">
        </div>

        <div class="upload-format">
            Expected format: 
            <span class="format-tag">DateTime,Type,Price,Bid,Ask,Volume</span>
        </div>

        <div class="progress-container" id="progressContainer">
            <div class="progress-label">
                <span id="progressLabel">Parsing CSV...</span>
                <span id="progressPct">0%</span>
            </div>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progressFill"></div>
            </div>
            <div class="progress-stats" id="progressStats"></div>
        </div>
    </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════════ -->
<!-- CHART SCREEN                                                       -->
<!-- ═══════════════════════════════════════════════════════════════════ -->
<div class="chart-screen" id="chartScreen">
    <div class="header">
        <div class="symbol-badge" id="symbolBadge">—</div>
        <div>
            <div class="symbol-name" id="symbolName">—</div>
            <div class="symbol-exchange" id="symbolExchange">—</div>
        </div>
        <div class="price-display">
            <span class="current-price" id="headerPrice">—</span>
            <span class="price-change" id="headerChange">—</span>
        </div>
        <button class="new-file-btn" onclick="resetToUpload()">↑ New File</button>
    </div>

    <div class="toolbar">
        <span class="toolbar-label">TF</span>
        <div class="tf-group" id="tfGroup"></div>
        <div class="toolbar-sep"></div>
        <button class="chart-type-btn active" id="btnCandle" onclick="setChartType('candle')">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="5" y="4" width="4" height="16" rx="1"/><rect x="15" y="8" width="4" height="12" rx="1"/></svg>
            Candles
        </button>
        <button class="chart-type-btn" id="btnLine" onclick="setChartType('line')">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="22 12 18 8 12 14 8 10 2 16"/></svg>
            Line
        </button>
        <div class="toolbar-sep"></div>
        <span class="toolbar-label" id="tickCountLabel">—</span>
        <div class="toolbar-sep"></div>
        <button class="ind-btn active" id="indEma9" onclick="toggleIndicator('ema9')" title="EMA 9">
            <span class="ind-dot" style="background:#ffd54f"></span>EMA 9
        </button>
        <button class="ind-btn active" id="indEma21" onclick="toggleIndicator('ema21')" title="EMA 21">
            <span class="ind-dot" style="background:#26c6da"></span>EMA 21
        </button>
        <button class="ind-btn" id="indSma50" onclick="toggleIndicator('sma50')" title="SMA 50">
            <span class="ind-dot" style="background:#ff9800"></span>SMA 50
        </button>
        <button class="ind-btn" id="indSma200" onclick="toggleIndicator('sma200')" title="SMA 200">
            <span class="ind-dot" style="background:#e040fb"></span>SMA 200
        </button>
        <button class="ind-btn active" id="indVwap" onclick="toggleIndicator('vwap')" title="VWAP">
            <span class="ind-dot" style="background:#fff"></span>VWAP
        </button>
        <button class="ind-btn active" id="indRsi" onclick="toggleIndicator('rsi')" title="RSI 14">
            <span class="ind-dot" style="background:#b388ff"></span>RSI
        </button>
        <div class="toolbar-sep"></div>
        <button class="trades-btn" id="btnTrades" onclick="document.getElementById('tradesInput').click()">
